# AI API 中转站 — Nginx 反向代理配置
# 使用方式：将此文件拷贝到 /etc/nginx/sites-available/ 后 ln -s 到 sites-enabled/

server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名

    # 客户端请求体最大体积
    client_max_body_size 50m;

    # 默认 Nginx 只压缩 HTML；显式覆盖手机端所需静态资源类型。
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;

    # ========== 后端 API + 代理端点 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;         # AI 请求可能耗时较长
        proxy_connect_timeout 10s;
    }

    # ========== 前端静态文件 ==========
    location ^~ /assets/ {
        root /var/www/ai-api-proxy/dist;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /index.html {
        root /var/www/ai-api-proxy/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location / {
        root /var/www/ai-api-proxy/dist;  # 前端构建产物目录
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA History 模式回退
    }

    # ========== 安全头 ==========
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
